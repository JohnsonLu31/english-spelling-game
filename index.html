<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文拼字練習</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0; 
            height: 100vh; 
            background-color: #f0f8ff; 
            user-select: none;
            touch-action: manipulation;
        }
        
        .main-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        @media (min-width: 768px) { .main-container { flex-direction: row; } }
        
        /* 左半部：單一字母與控制鍵 */
        .left-panel {
            flex: 1; 
            display: flex; 
            flex-direction: column;
            padding: 20px; 
            border-right: 2px dashed #ccc;
        }
        .keyboard-area {
            display: flex; 
            flex-wrap: wrap; 
            align-content: flex-start; 
            gap: 8px; 
            flex: 1;
        }
        .letter-btn {
            width: calc(100% / 5 - 8px); 
            min-width: 45px; height: 60px; font-size: 26px; font-weight: bold;
            background-color: #fff; border: 2px solid #4CAF50; border-radius: 10px;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .letter-btn:active { background-color: #4CAF50; color: white; transform: scale(0.95); }
        
        .control-group { display: flex; gap: 10px; margin-top: 15px; }
        .control-btn {
            flex: 1; height: 50px; font-size: 18px; font-weight: bold; color: white;
            border: none; border-radius: 10px; cursor: pointer;
        }
        .btn-confirm { background-color: #2196F3; } 
        .btn-backspace { background-color: #ff9800; } 
        .btn-clear { background-color: #f44336; }   
        
        /* 右半部：顯示區與組合字母區 */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        /* 右上：顯示區 */
        .display-area {
            flex: 6; 
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 20px; text-align: center;
        }
        #current-word { font-size: 60px; letter-spacing: 5px; color: #333; min-height: 80px; font-weight: bold; }
        #message { font-size: 24px; color: #ff9800; margin-top: 15px; white-space: pre-line; }
        
        /* 右下：組合字母區 */
        .combo-area {
            flex: 4;
            display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px;
            padding: 20px;
            background-color: #e8f5e9; /* 稍微不同的背景色以作區隔 */
            border-top: 2px dashed #ccc;
        }
        .combo-btn {
            width: calc(100% / 4 - 8px); 
            min-width: 55px; height: 60px; font-size: 22px; font-weight: bold;
            background-color: #fff; border: 2px solid #9C27B0; border-radius: 10px;
            color: #9C27B0; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .combo-btn:active { background-color: #9C27B0; color: white; transform: scale(0.95); }

    </style>
</head>
<body>

    <audio id="ios-audio-player"></audio>

    <div class="main-container">
        <div class="left-panel">
            <div class="keyboard-area" id="keyboard"></div>
            <div class="control-group" id="controls"></div>
        </div>

        <div class="right-panel">
            <div class="display-area">
                <div id="current-word"></div>
                <div id="message">請點擊字母，拼完後按下確定！</div>
            </div>
            <div class="combo-area" id="combo-keyboard"></div>
        </div>
    </div>

    <script>
        let currentString = "";
        let isAudioUnlocked = false; 
        const wordDisplay = document.getElementById("current-word");
        const messageDisplay = document.getElementById("message");
        const keyboard = document.getElementById("keyboard");
        const comboKeyboard = document.getElementById("combo-keyboard");
        const controls = document.getElementById("controls");
        const audioPlayer = document.getElementById("ios-audio-player");

        // 黑名單
        const badWordsBlacklist = [
            "fuck", "shit", "bitch", "ass", "asshole", 
            "dick", "cock", "pussy", "sex", "crap", "damn",
            "idiot", "stupid"
        ];

        function unlockAudio() {
            if (!isAudioUnlocked) {
                audioPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA";
                audioPlayer.play().catch(() => {});
                isAudioUnlocked = true;
            }
        }
        document.addEventListener('touchstart', unlockAudio, { once: true });
        document.addEventListener('click', unlockAudio, { once: true });

        // --- 輸入邏輯 (支援底線替換) ---
        function handleInput(input) {
            unlockAudio(); 
            
            // 若目前字串包含底線，則將底線替換為新輸入的字母或組合
            if (currentString.includes('_')) {
                currentString = currentString.replace('_', input);
            } else {
                currentString += input;
            }
            updateDisplay("拼湊中...", "#ff9800");
        }

        // --- 1. 左側字母區 (a-z) ---
        const alphabet = "abcdefghijklmnopqrstuvwxyz".split("");
        alphabet.forEach(letter => {
            let btn = document.createElement("button");
            btn.className = "letter-btn";
            btn.innerText = letter;
            btn.onclick = () => handleInput(letter);
            keyboard.appendChild(btn);
        });

        // --- 2. 控制按鈕 ---
        let confirmBtn = document.createElement("button");
        confirmBtn.className = "control-btn btn-confirm";
        confirmBtn.innerText = "確定";
        confirmBtn.onclick = handleConfirmClick;

        let backspaceBtn = document.createElement("button");
        backspaceBtn.className = "control-btn btn-backspace";
        backspaceBtn.innerText = "⬅ 刪除";
        backspaceBtn.onclick = () => {
            // 刪除最後一個字元 (若剛好是組合字元的最後一個字母也會被單一刪除)
            currentString = currentString.slice(0, -1); 
            updateDisplay(currentString.length > 0 ? "拼湊中..." : "請點擊字母開始拼字！", "#ff9800");
        };

        let clearBtn = document.createElement("button");
        clearBtn.className = "control-btn btn-clear";
        clearBtn.innerText = "全清除";
        clearBtn.onclick = () => {
            currentString = "";
            updateDisplay("請點擊字母，拼完後按下確定！", "#ff9800");
        };

        controls.appendChild(confirmBtn);
        controls.appendChild(backspaceBtn);
        controls.appendChild(clearBtn);

        // --- 3. 右下組合字母區 ---
        const combos = ["th", "ch", "sh", "tr", "cr", "br", "gr", "bl"];
        const magicE = ["a_e", "e_e", "i_e", "o_e", "u_e"];
        const allCombos = combos.concat(magicE);

        allCombos.forEach(combo => {
            let btn = document.createElement("button");
            btn.className = "combo-btn";
            btn.innerText = combo;
            btn.onclick = () => handleInput(combo);
            comboKeyboard.appendChild(btn);
        });

        function updateDisplay(msg, color) {
            wordDisplay.innerText = currentString;
            messageDisplay.innerText = msg;
            messageDisplay.style.color = color;
        }

        // --- 4. 核心檢查與攔截邏輯 ---
        function handleConfirmClick() {
            if (currentString.length === 0) {
                updateDisplay("請先輸入字母喔！", "#f44336");
                return;
            }
            if (currentString.includes('_')) {
                updateDisplay("底線尚未填寫完畢喔！", "#f44336");
                return;
            }

            if (badWordsBlacklist.includes(currentString)) {
                triggerFunBlocker();
                return; 
            }

            updateDisplay("檢查中，請稍候...", "#2196F3");
            checkIfValidWord(currentString);
        }

        function triggerFunBlocker() {
            wordDisplay.innerText = "🙈 🙉 🙊"; 
            messageDisplay.innerText = "哎呀！這個字太調皮了，被猴子抓走了！\n請換一個單字試試看吧！";
            messageDisplay.style.color = "#9C27B0"; 

            let utterance = new SpeechSynthesisUtterance("Oops!");
            utterance.lang = 'en-US';
            utterance.pitch = 2; 
            window.speechSynthesis.speak(utterance);

            setTimeout(() => {
                currentString = "";
                updateDisplay("請點擊字母開始拼字！", "#ff9800");
            }, 2500);
        }

        // --- 5. API 查詢與發音邏輯 ---
        async function checkIfValidWord(word) {
            try {
                let response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                
                if (response.ok) {
                    let data = await response.json();
                    playDictionaryAudio(data, word);

                    updateDisplay("恭喜！這是一個單字！🎉\n正在翻譯中...", "#4CAF50");
                    
                    // ⚠️ 部署時請務必將此處替換為您的 Google Apps Script 網址
                    let gasUrl = `https://script.google.com/macros/s/AKfycbz4bOT00wJck7SpSxNgUtFCItmQF7uuJ2HpniPQZGOkzP818pU6UdFtOZ923-QqLd3RKQ/exec?word=${word}`;
                    
                    let transResponse = await fetch(gasUrl);
                    let translatedText = await transResponse.text();
                    updateDisplay(`恭喜！這是一個單字！🎉\n中文意思：${translatedText}`, "#4CAF50");
                } else {
                    updateDisplay("這好像不是一個完整的單字喔！🤔", "#f44336");
                }
            } catch (error) {
                updateDisplay("網路連線發生錯誤，請稍後再試。", "#f44336");
            }
        }

        function playDictionaryAudio(data, word) {
            let audioUrl = "";
            for (let phonetic of data[0].phonetics) {
                if (phonetic.audio && phonetic.audio !== "") {
                    audioUrl = phonetic.audio;
                    break;
                }
            }

            if (audioUrl !== "") {
                audioPlayer.src = audioUrl;
                audioPlayer.play().catch(e => console.log("播放失敗", e));
            } else {
                let utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
