<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文拼字練習</title>
    <style>
        body {
            display: flex; flex-direction: column; font-family: 'Arial', sans-serif;
            margin: 0; height: 100vh; background-color: #f0f8ff; user-select: none;
            touch-action: manipulation;
        }
        @media (min-width: 768px) { body { flex-direction: row; } }
        
        .keyboard-area {
            flex: 1; padding: 20px; display: flex; flex-wrap: wrap; 
            align-content: flex-start; gap: 8px; border-right: 2px dashed #ccc;
        }
        .letter-btn {
            width: calc(100% / 6 - 10px); 
            min-width: 50px; height: 60px; font-size: 26px; font-weight: bold;
            background-color: #fff; border: 2px solid #4CAF50; border-radius: 10px;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .letter-btn:active { background-color: #4CAF50; color: white; transform: scale(0.95); }
        
        .control-group { width: 100%; display: flex; gap: 10px; margin-top: 15px; }
        .control-btn {
            flex: 1; height: 50px; font-size: 18px; font-weight: bold; color: white;
            border: none; border-radius: 10px; cursor: pointer;
        }
        .btn-confirm { background-color: #2196F3; } 
        .btn-backspace { background-color: #ff9800; } 
        .btn-clear { background-color: #f44336; }   
        
        .display-area {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 20px; text-align: center;
        }
        /* 稍微調整顯示區字體，讓小寫看起來更清楚 */
        #current-word { font-size: 60px; letter-spacing: 5px; color: #333; min-height: 80px; font-weight: bold; }
        #message { font-size: 24px; color: #ff9800; margin-top: 15px; white-space: pre-line; }
    </style>
</head>
<body>

    <div class="keyboard-area" id="keyboard"></div>

    <div class="display-area">
        <div id="current-word"></div>
        <div id="message">請點擊字母，拼完後按下確定！</div>
    </div>

    <script>
        let currentString = "";
        let isAudioUnlocked = false; 
        const wordDisplay = document.getElementById("current-word");
        const messageDisplay = document.getElementById("message");
        const keyboard = document.getElementById("keyboard");

        // --- 1. 強化版：手機語音解鎖機制 ---
        function unlockAudio() {
            if (!isAudioUnlocked) {
                // 發出一個完全無聲的聲音，騙過手機的安全機制
                let silentUtterance = new SpeechSynthesisUtterance('');
                silentUtterance.volume = 0; 
                window.speechSynthesis.speak(silentUtterance);
                window.speechSynthesis.resume(); // 強制喚醒引擎
                isAudioUnlocked = true;
            }
        }
        document.addEventListener('touchstart', unlockAudio, { once: true });
        document.addEventListener('click', unlockAudio, { once: true });

        // --- 2. 字母改成「小寫」 ---
        // 只要把這裡的字串換成小寫，整個鍵盤和畫面就會自動變成小寫了！
        const alphabet = "abcdefghijklmnopqrstuvwxyz".split("");
        alphabet.forEach(letter => {
            let btn = document.createElement("button");
            btn.className = "letter-btn";
            btn.innerText = letter;
            btn.onclick = () => handleLetterClick(letter);
            keyboard.appendChild(btn);
        });

        // 建立控制按鈕
        let controlGroup = document.createElement("div");
        controlGroup.className = "control-group";

        let confirmBtn = document.createElement("button");
        confirmBtn.className = "control-btn btn-confirm";
        confirmBtn.innerText = "確定";
        confirmBtn.onclick = handleConfirmClick;

        let backspaceBtn = document.createElement("button");
        backspaceBtn.className = "control-btn btn-backspace";
        backspaceBtn.innerText = "⬅ 刪除";
        backspaceBtn.onclick = handleBackspace;

        let clearBtn = document.createElement("button");
        clearBtn.className = "control-btn btn-clear";
        clearBtn.innerText = "全清除";
        clearBtn.onclick = clearWord;

        controlGroup.appendChild(confirmBtn);
        controlGroup.appendChild(backspaceBtn);
        controlGroup.appendChild(clearBtn);
        keyboard.appendChild(controlGroup);

        // --- 3. 按鈕互動邏輯 ---
        function handleLetterClick(letter) {
            unlockAudio(); // 每次按字母都再次確保語音引擎是醒著的
            currentString += letter;
            updateDisplay("拼湊中...", "#ff9800");
        }

        function handleBackspace() {
            currentString = currentString.slice(0, -1); 
            updateDisplay(currentString.length > 0 ? "拼湊中..." : "請點擊字母開始拼字！", "#ff9800");
        }

        function clearWord() {
            currentString = "";
            updateDisplay("請點擊字母，拼完後按下確定！", "#ff9800");
        }

        function updateDisplay(msg, color) {
            wordDisplay.innerText = currentString;
            messageDisplay.innerText = msg;
            messageDisplay.style.color = color;
        }

        // --- 4. 核心檢查邏輯 ---
        function handleConfirmClick() {
            if (currentString.length === 0) {
                updateDisplay("請先輸入字母喔！", "#f44336");
                return;
            }
            updateDisplay("檢查中，請稍候...", "#2196F3");
            checkIfValidWord(currentString);
        }

        async function checkIfValidWord(word) {
            try {
                let response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                
                if (response.ok) {
                    speakWord(word); // 呼叫強化版的發音功能
                    updateDisplay("恭喜！這是一個單字！🎉\n正在翻譯中...", "#4CAF50");
                    
                    // ⚠️ 將下方網址換成您的 Google API
                    let gasUrl = `https://script.google.com/macros/s/AKfycbz4bOT00wJck7SpSxNgUtFCItmQF7uuJ2HpniPQZGOkzP818pU6UdFtOZ923-QqLd3RKQ/exec?word=${word}`;
                    
                    let transResponse = await fetch(gasUrl);
                    let translatedText = await transResponse.text();
                    updateDisplay(`恭喜！這是一個單字！🎉\n中文意思：${translatedText}`, "#4CAF50");
                } else {
                    updateDisplay("這好像不是一個完整的單字喔！🤔", "#f44336");
                }
            } catch (error) {
                updateDisplay("網路連線發生錯誤，請稍後再試。", "#f44336");
            }
        }

        // --- 5. 強化版：強制突破手機限制的發音功能 ---
        function speakWord(word) {
            window.speechSynthesis.cancel(); // 秘訣 1：先清除所有卡住的聲音
            
            let utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = 0.9; // 語速稍微放慢，對國小生更友善
            
            window.speechSynthesis.speak(utterance);
            window.speechSynthesis.resume(); // 秘訣 2：強制推動語音引擎播放
        }
    </script>
</body>
</html>
